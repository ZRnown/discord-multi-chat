<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord 多账号聊天</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== 侧边栏 ========== -->
<div id="sidebar">
  <!-- 账号区 -->
  <div id="accounts-header">
    <span class="section-title">账号</span>
    <button id="btn-add-account" title="添加账号">+</button>
  </div>
  <div id="accounts-list"></div>

  <div class="divider"></div>

  <!-- 好友列表 -->
  <div id="friends-header">
    <span class="section-title">私信</span>
  </div>
  <div id="friends-list"></div>
</div>

<!-- ========== 聊天面板 ========== -->
<div id="chat-panel">
  <!-- 顶部栏 -->
  <div id="chat-topbar">
    <div id="chat-friend-info">
      <div id="chat-friend-avatar">?</div>
      <div id="chat-friend-name">选择一个好友开始聊天</div>
    </div>
  </div>

  <!-- 消息区 -->
  <div id="messages-container">
    <div id="messages-list"></div>
  </div>

  <!-- 输入区 -->
  <div id="input-area">
    <div id="attachment-preview"></div>
    <div id="input-row">
      <button id="btn-attach" title="发送文件">📎</button>
      <input type="file" id="file-input" multiple hidden>
      <textarea id="message-input" placeholder="输入消息..." rows="1" disabled></textarea>
      <button id="btn-emoji" title="表情">😊</button>
      <button id="btn-send" disabled>发送</button>
    </div>
    <div id="emoji-picker" class="hidden"></div>
  </div>
</div>

<!-- ========== 登录弹窗 ========== -->
<div id="login-modal" class="modal">
  <div class="modal-content">
    <h2>添加 Discord 账号</h2>
    <p>输入你的 Discord 用户 token 来登录。</p>
    <p class="hint">可以在 Discord 开发者工具（F12）的 Network 标签页中找到 Authorization 请求头获取 token。</p>
    <input type="password" id="login-token-input" placeholder="在此粘贴 token...">
    <div class="modal-buttons">
      <button id="btn-login-submit">登录</button>
      <button id="btn-login-cancel" class="btn-secondary">取消</button>
    </div>
    <div id="login-error" class="error-text hidden"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
